<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ultralight Code</title>
    <link rel="stylesheet" href="styles/main.css">
</head>
<body>
    <div id="app">
        <!-- Title Bar -->
        <header class="titlebar">
            <div class="titlebar-drag-region"></div>
            <div class="titlebar-menu">
                <button class="menu-item" data-menu="file">File</button>
                <button class="menu-item" data-menu="edit">Edit</button>
                <button class="menu-item" data-menu="selection">Selection</button>
                <button class="menu-item" data-menu="view">View</button>
                <button class="menu-item" data-menu="go">Go</button>
                <button class="menu-item" data-menu="run">Run</button>
                <button class="menu-item" data-menu="terminal">Terminal</button>
                <button class="menu-item" data-menu="help">Help</button>
            </div>
            <div class="titlebar-title">Ultralight Code</div>
            <div class="titlebar-controls">
                <button class="window-control" data-action="minimize">−</button>
                <button class="window-control" data-action="maximize">□</button>
                <button class="window-control" data-action="close">×</button>
            </div>
        </header>

        <!-- Main Layout -->
        <div class="main-container">
            <!-- Activity Bar (Left) -->
            <aside class="activity-bar">
                <button class="activity-item active" data-view="explorer" title="Explorer">
                    <svg viewBox="0 0 16 16" width="24" height="24">
                        <path d="M10 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2h-8l-2-2z"/>
                    </svg>
                </button>
                <button class="activity-item" data-view="search" title="Search">
                    <svg viewBox="0 0 16 16" width="24" height="24">
                        <path d="M15.7 14.3l-3.1-3.1C13.5 10.3 14 9.2 14 8c0-3.3-2.7-6-6-6S2 4.7 2 8s2.7 6 6 6c1.2 0 2.3-.5 3.2-1.4l3.1 3.1c.4.4 1 .4 1.4 0s.4-1 0-1.4zM8 12c-2.2 0-4-1.8-4-4s1.8-4 4-4 4 1.8 4 4-1.8 4-4 4z"/>
                    </svg>
                </button>
                <button class="activity-item" data-view="source-control" title="Source Control">
                    <svg viewBox="0 0 16 16" width="24" height="24">
                        <path d="M11.5 4.5c0-1.1-.9-2-2-2s-2 .9-2 2 .9 2 2 2 2-.9 2-2zM5.5 11.5c0-1.1-.9-2-2-2s-2 .9-2 2 .9 2 2 2 2-.9 2-2zm9 0c0-1.1-.9-2-2-2s-2 .9-2 2 .9 2 2 2 2-.9 2-2z"/>
                        <path d="M8.5 6.5v5M3.5 11.5v-5c0-1.1.9-2 2-2h1"/>
                    </svg>
                </button>
                <button class="activity-item" data-view="extensions" title="Extensions">
                    <svg viewBox="0 0 16 16" width="24" height="24">
                        <path d="M10 10H6v4H2v-4H0V6h4V2h4v4h4v4h-2z"/>
                    </svg>
                </button>
                <button class="activity-item" data-view="settings" title="Settings">
                    <svg viewBox="0 0 16 16" width="24" height="24">
                        <path d="M12 8c0-2.2-1.8-4-4-4S4 5.8 4 8s1.8 4 4 4 4-1.8 4-4z"/>
                        <path d="M14.7 7H13c-.2-1-.6-2-1.1-2.9l1.2-1.2c.4-.4.4-1 0-1.4l-1.4-1.4c-.4-.4-1-.4-1.4 0L9.1 1.3C8.2.8 7.2.4 6.2.2V0H4.2v.2C3.2.4 2.2.8 1.3 1.3L.1.1C-.3-.3-.9-.3-1.3.1L-2.7 1.5c-.4.4-.4 1 0 1.4l1.2 1.2C-2 5-2.4 6-2.6 7H-4v2h1.6c.2 1 .6 2 1.1 2.9l-1.2 1.2c-.4.4-.4 1 0 1.4l1.4 1.4c.4.4 1 .4 1.4 0l1.2-1.2c.9.5 1.9.9 2.9 1.1v1.6h2v-1.6c1-.2 2-.6 2.9-1.1l1.2 1.2c.4.4 1 .4 1.4 0l1.4-1.4c.4-.4.4-1 0-1.4l-1.2-1.2c.5-.9.9-1.9 1.1-2.9H16V7z"/>
                    </svg>
                </button>
            </aside>

            <!-- Sidebar (Explorer, etc.) -->
            <aside class="sidebar" id="sidebar">
                <div class="sidebar-header">
                    <span class="sidebar-title">EXPLORER</span>
                    <div class="sidebar-actions">
                        <button class="action-btn" title="New File">📄</button>
                        <button class="action-btn" title="New Folder">📁</button>
                        <button class="action-btn" title="Refresh">🔄</button>
                    </div>
                </div>
                <div class="sidebar-content">
                    <div class="explorer-section">
                        <div class="section-header">
                            <span class="section-icon">▼</span>
                            <span class="section-title">WORKSPACE</span>
                        </div>
                        <ul class="file-tree" id="file-tree">
                            <!-- File tree will be populated dynamically -->
                        </ul>
                    </div>
                </div>
            </aside>

            <!-- Editor Area -->
            <main class="editor-area">
                <!-- Tabs -->
                <div class="tabs-container" id="tabs-container">
                    <!-- Tabs will be added dynamically -->
                </div>

                <!-- Editor Content -->
                <div class="editor-container" id="editor-container">
                    <div class="welcome-tab" id="welcome-tab">
                        <div class="welcome-content">
                            <h1>Ultralight Code</h1>
                            <p class="subtitle">Lightweight. Fast. Powerful.</p>
                            
                            <div class="start-actions">
                                <button class="start-btn" onclick="openFile()">
                                    <span class="btn-icon">📂</span>
                                    Open File
                                </button>
                                <button class="start-btn" onclick="openFolder()">
                                    <span class="btn-icon">📁</span>
                                    Open Folder
                                </button>
                                <button class="start-btn" onclick="newFile()">
                                    <span class="btn-icon">📄</span>
                                    New File
                                </button>
                            </div>

                            <div class="recent-files">
                                <h3>Recent Files</h3>
                                <ul id="recent-files-list">
                                    <!-- Recent files will be listed here -->
                                </ul>
                            </div>
                        </div>
                    </div>
                    
                    <!-- Code editor will be injected here -->
                    <div class="code-editor" id="code-editor" style="display: none;">
                        <div class="editor-gutter" id="line-numbers"></div>
                        <textarea class="editor-textarea" id="editor-textarea" spellcheck="false"></textarea>
                        <div class="editor-highlights" id="editor-highlights"></div>
                    </div>
                </div>
            </main>

            <!-- Panel (Terminal, Output, etc.) -->
            <section class="panel" id="panel">
                <div class="panel-tabs">
                    <button class="panel-tab active" data-panel="terminal">Terminal</button>
                    <button class="panel-tab" data-panel="output">Output</button>
                    <button class="panel-tab" data-panel="problems">Problems</button>
                    <button class="panel-tab" data-panel="debug-console">Debug Console</button>
                </div>
                <div class="panel-content">
                    <div class="panel-pane active" id="terminal-pane">
                        <div class="terminal" id="terminal">
                            <div class="terminal-line">Welcome to Ultralight Code Terminal</div>
                            <div class="terminal-line">$ <span class="terminal-cursor">▌</span></div>
                        </div>
                    </div>
                </div>
            </section>
        </div>

        <!-- Status Bar -->
        <footer class="statusbar">
            <div class="statusbar-left">
                <span class="status-item" id="git-status">⎇ main</span>
                <span class="status-item" id="error-count">✓ 0 ⚠ 0</span>
            </div>
            <div class="statusbar-right">
                <span class="status-item" id="cursor-position">Ln 1, Col 1</span>
                <span class="status-item" id="indentation">Spaces: 4</span>
                <span class="status-item" id="encoding">UTF-8</span>
                <span class="status-item" id="language-mode">Plain Text</span>
            </div>
        </footer>
    </div>

    <script src="js/app.js"></script>
</body>
</html>
